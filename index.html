<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAS vs RAYAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --yas-blonde: #f7e07a;
            --highlight: #ff0055;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Press+Start+2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Responsive Canvas */
        .game-canvas {
            width: 95vw; /* 95% of viewport width */
            max-width: 900px; /* Max size for laptop */
            height: 60vh; /* 60% of viewport height */
            background: #000;
            border: 4px solid #222;
            position: relative;
            overflow: hidden;
        }

        /* Responsive Sprites */
        .sprite {
            width: 35%; /* Scales based on screen width */
            height: 80%;
            position: absolute;
            bottom: 5%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
        }

        .yasmine {
            left: 2%;
            background-image: url('yasmine.png');
        }

        .rayan {
            right: 2%;
            background-image: url('rayan.png');
            animation: tremor 0.15s infinite;
        }

        /* Scalable Heart */
        .target-heart {
            font-size: 8vw; /* Scale font with screen size */
            max-font-size: 50px;
            position: absolute;
            top: 40%;
            right: 12%;
            z-index: 10;
        }

        /* Scalable Arrow */
        .arrow {
            position: absolute;
            top: 42%;
            left: 25%; 
            font-size: 6vw;
            display: none;
            z-index: 5;
        }

        /* Pulsing Start Button - Responsive Text */
        .btn-start {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--yas-blonde);
            color: #000;
            border: 4px solid #fff;
            padding: 15px 20px;
            font-family: 'Press+Start+2P', cursive;
            font-size: 3vw; /* Scales for phone */
            min-font-size: 12px;
            cursor: pointer;
            z-index: 30;
            animation: buttonPulse 0.8s infinite;
            white-space: nowrap;
        }

        /* Laptop adjustment for font */
        @media (min-width: 900px) {
            .btn-start { font-size: 18px; }
            .target-heart { font-size: 50px; }
            .arrow { font-size: 40px; }
        }

        @keyframes buttonPulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* Overlay */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
            padding: 10px;
        }

        .prompt {
            color: var(--highlight);
            font-size: 3vw;
            min-font-size: 10px;
            margin-bottom: 20px;
        }

        .btn-stop {
            background: #fff;
            padding: 15px;
            font-family: 'Press+Start+2P', cursive;
            font-size: 12px;
            cursor: pointer;
            border: none;
        }

        @keyframes tremor {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        @keyframes shakeScreen {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(10px, 0); }
            75% { transform: translate(-10px, 0); }
        }
    </style>
</head>
<body>

    <div class="game-canvas" id="stage">
        <div class="sprite yasmine"></div>
        <div class="sprite rayan"></div>
        
        <div class="target-heart" id="heart">❤️</div>
        <div class="arrow" id="arrow">💘</div>

        <button class="btn-start" id="start-btn" onclick="fire()">YASMINE: TAKE AIM</button>

        <div class="overlay" id="overlay">
            <div class="prompt" id="text">THE ARROW IS FLYING!<br>STOP IT NOW!</div>
            <button class="btn-stop" id="stop-btn" onclick="stop()">STOP IT!</button>
        </div>
    </div>

    <script>
        let move;
        let hit = false;

        function fire() {
            document.getElementById('start-btn').style.display = 'none';
            const arrow = document.getElementById('arrow');
            const overlay = document.getElementById('overlay');
            arrow.style.display = 'block';
            overlay.style.display = 'flex';

            let pos = 25; // Percentage based
            move = setInterval(() => {
                pos += 0.5; // Slow movement
                arrow.style.left = pos + '%';

                if (pos >= 78 && !hit) { // Hits Rayan at 78% of the stage
                    clearInterval(move);
                    gameOver();
                }
            }, 15);
        }

        function stop() {
            clearInterval(move);
            hit = true;
            document.getElementById('text').innerHTML = "SAVED!<br>YASMINE SPARED HIM.";
            document.getElementById('text').style.color = "#00ff88";
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('heart').innerHTML = "💙";
            document.querySelector('.rayan').style.animation = "none";
        }

        function gameOver() {
            hit = true;
            document.getElementById('stage').style.animation = "shakeScreen 0.3s";
            document.getElementById('heart').innerHTML = "💔";
            document.getElementById('text').innerHTML = "TOO LATE!<br>YASMINE BROKE HIS HEART.";
            document.getElementById('text').style.color = "white";
            document.getElementById('stop-btn').style.display = 'none';
        }
    </script>
</body>
</html>
