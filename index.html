<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAS vs RAYAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --yas-blonde: #f7e07a;
            --highlight: #ff0055;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Press+Start+2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        .game-canvas {
            width: 900px;
            height: 550px;
            background: #000; /* Matching your image backgrounds */
            border: 6px solid #222;
            position: relative;
        }

        /* Character Sprites */
        .sprite {
            width: 300px; /* Larger for cartoon detail */
            height: 400px;
            position: absolute;
            bottom: 20px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom;
        }

        .yasmine {
            left: 20px;
            background-image: url('yasmine.png');
        }

        .rayan {
            right: 20px;
            background-image: url('rayan.png');
            animation: tremor 0.15s infinite;
        }

        /* The Heart on Rayan's chest */
        .target-heart {
            font-size: 50px;
            position: absolute;
            bottom: 220px;
            right: 140px;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }

        /* The Arrow */
        .arrow {
            position: absolute;
            bottom: 240px;
            left: 280px; 
            font-size: 40px;
            display: none;
            z-index: 5;
            filter: drop-shadow(0 0 5px white);
        }

        /* Start Button with Zoom effect */
        .btn-start {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--yas-blonde);
            color: #000;
            border: 4px solid #fff;
            padding: 25px 40px;
            font-family: 'Press+Start+2P', cursive;
            font-size: 18px;
            cursor: pointer;
            z-index: 30;
            animation: buttonPulse 0.8s infinite;
        }

        @keyframes buttonPulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.15); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* Overlay & Final UI */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            text-align: center;
        }

        .prompt {
            color: var(--highlight);
            font-size: 20px;
            margin-bottom: 30px;
        }

        .btn-stop {
            background: #fff;
            padding: 20px;
            font-family: 'Press+Start+2P', cursive;
            cursor: pointer;
            border: none;
        }

        @keyframes tremor {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        @keyframes shakeScreen {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(15px, 0); }
            75% { transform: translate(-15px, 0); }
        }
    </style>
</head>
<body>

    <div class="game-canvas" id="stage">
        <div class="sprite yasmine"></div>
        <div class="sprite rayan"></div>
        
        <div class="target-heart" id="heart">❤️</div>
        <div class="arrow" id="arrow">💘</div>

        <button class="btn-start" id="start-btn" onclick="fire()">YASMINE: TAKE AIM</button>

        <div class="overlay" id="overlay">
            <div class="prompt" id="text">THE ARROW IS FLYING!<br>STOP IT NOW!</div>
            <button class="btn-stop" id="stop-btn" onclick="stop()">STOP IT!</button>
        </div>
    </div>

    <script>
        let move;
        let hit = false;

        function fire() {
            document.getElementById('start-btn').style.display = 'none';
            const arrow = document.getElementById('arrow');
            const overlay = document.getElementById('overlay');
            arrow.style.display = 'block';
            overlay.style.display = 'flex';

            let x = 280;
            move = setInterval(() => {
                x += 1.5; // Slow motion speed
                arrow.style.left = x + 'px';

                if (x >= 700 && !hit) {
                    clearInterval(move);
                    gameOver();
                }
            }, 10);
        }

        function stop() {
            clearInterval(move);
            hit = true;
            document.getElementById('text').innerHTML = "SAVED!<br>YASMINE SPARED HIM.";
            document.getElementById('text').style.color = "#00ff88";
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('heart').innerHTML = "💙";
            document.querySelector('.rayan').style.animation = "none";
        }

        function gameOver() {
            hit = true;
            document.getElementById('stage').style.animation = "shakeScreen 0.3s";
            document.getElementById('heart').innerHTML = "💔";
            document.getElementById('text').innerHTML = "TOO LATE!<br>YASMINE BROKE HIS HEART.";
            document.getElementById('text').style.color = "white";
            document.getElementById('stop-btn').style.display = 'none';
        }
    </script>
</body>
</html>
